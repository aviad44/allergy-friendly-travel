
<!DOCTYPE html>
<html lang="en" prefix="og: https://ogp.me/ns#">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, shrink-to-fit=no" />
    <title>Allergy-Friendly Travel Guide | Safe Hotels & Tips for Dietary Restrictions</title>
    
    <!-- Favicon - updated to use the new logo -->
    <link rel="icon" href="/lovable-uploads/9a760c6c-9c78-40fe-bd6f-90c7fbef6663.png" type="image/png" />
    <link rel="apple-touch-icon" href="/lovable-uploads/9a760c6c-9c78-40fe-bd6f-90c7fbef6663.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#005566" />
    <meta name="msapplication-TileColor" content="#005566" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    
    <!-- Critical CSS Inlining (optimized above-the-fold styles) -->
    <style>
      /* Critical path CSS for fastest rendering */
      body{margin:0;padding:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fff;font-display:swap}
      .hero-section{min-height:100vh;position:relative;display:flex;align-items:center;justify-content:center}
      /* Preload critical font */
      @font-face{font-family:'Poppins';font-style:normal;font-weight:400;font-display:swap;src:local('Poppins Regular'),local('Poppins-Regular')}
    </style>
    
    <!--
      Preload critical resources with highest priority.
      No hero-image preload here on purpose: this file is the one static
      shell served for every route, but the hero image differs per route
      (see MetaManager, which preloads the correct per-route image
      dynamically). A hardcoded preload here previously always pointed at
      the homepage image, wasting priority bandwidth on every other page
      while never actually preloading what that page needed.
    -->
    <link rel="preload" href="/src/index.css" as="style" />
    <link rel="preload" href="/src/main.tsx" as="script" crossorigin />
    
    <!-- Optimized font loading with only essential weights -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@400;600&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@400;600&display=swap" /></noscript>
    
    <!-- Preconnect for external resources with crossorigin -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin />
    
    <!-- DNS prefetch as fallback -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    
    <!-- Primary Meta Tags -->
    <meta name="author" content="Allergy Free Travel" />
    <meta name="keywords" content="allergy-friendly travel, food allergy hotels, gluten-free accommodation, dairy-free travel, nut-free hotels, allergen-free vacation, safe travel with allergies" />

    <!--
      Per-page description, canonical, og:*, twitter:*, robots, and JSON-LD
      are all set dynamically per route by MetaManager (react-helmet-async) —
      see src/components/MetaManager.tsx. Do NOT hardcode them here: this
      file is the one static shell served for every route (SPA), so a
      hardcoded canonical/description/og:url here creates a SECOND,
      conflicting tag alongside MetaManager's correct per-route one on every
      non-homepage page (e.g. two different <link rel="canonical"> on
      /destinations/paris — one pointing here at "/", one at the real page).
      That confused Google into potentially canonicalizing destination pages
      back to the homepage. Verified live via Search Console's Rich Results
      Test on 2026-07-20 before this fix.
    -->

    <!-- Optimized Analytics - defer loading to improve initial page load -->
    <script>
      // Defer analytics until after critical content loads
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-5PWZX00PL4', { 'send_page_view': false });
      
      // Load analytics script only after page is interactive
      window.addEventListener('load', function() {
        const script = document.createElement('script');
        script.async = true;
        script.src = 'https://www.googletagmanager.com/gtag/js?id=G-5PWZX00PL4';
        document.head.appendChild(script);
        
        // Send pageview after everything is loaded
        setTimeout(() => gtag('event', 'page_view'), 100);
      });
    </script>
    
    <!-- Critical CSS will be loaded via main.tsx for better control -->
</head>
<body>
    <div id="root"></div>
    <!-- Move all non-critical scripts to end of body for better performance -->
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
