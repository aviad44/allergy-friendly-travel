
[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[plugins]]
  package = "@netlify/plugin-sitemap"

  [plugins.inputs]
  buildDir = "dist"
  exclude = [
    # Exclude pages you don't want in the sitemap
    '**/404/**',
    '**/admin/**',
    '**/search/**'
  ]
  changeFreq = "weekly"
  priority = 0.5

# Enable optimizations for better performance
[build.processing]
  skip_processing = false
[build.processing.css]
  bundle = true
  minify = true
[build.processing.js]
  bundle = true
  minify = true
[build.processing.html]
  pretty_urls = true
[build.processing.images]
  compress = true

# Add security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "upgrade-insecure-requests"
    # Enable HTTP/2 Server Push
    Link = "</src/index.css>; rel=preload; as=style, </src/main.tsx>; rel=preload; as=script"

# Add improved cache control for static assets (7+ days)
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"
    Content-Type = "image/png"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Enable Brotli compression for better performance
[build.processing.brotli]
  enabled = true
  
# Additional optimizations via Edge Functions
[[edge_functions]]
  path = "/*"
  function = "optimize-static-assets"

# Prerender.io integration for social media crawlers (VERY IMPORTANT)
[[redirects]]
  from = "/*"
  to = "https://service.prerender.io/https://www.allergy-free-travel.com/:splat"
  status = 200
  force = true
  conditions = {Prerender = true}

# Specific header for the OG image to ensure proper content type
[[headers]]
  for = "/og-image-new.png"
  [headers.values]
    Content-Type = "image/png"
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/lovable-uploads/c0d4e111-501f-46b3-94ad-23c5b56f9736.png"
  [headers.values]
    Content-Type = "image/png"
    Cache-Control = "public, max-age=604800"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/lovable-uploads/e8b4dc3d-60a2-4fb7-bc33-77580f4d249c.png"
  [headers.values]
    Content-Type = "image/png"
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
    Access-Control-Allow-Origin = "*"

# WhatsApp specific headers for all PNG images
[[headers]]
  for = "/*.png"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET"
    Access-Control-Allow-Headers = "*"
    Cache-Control = "public, max-age=604800"
