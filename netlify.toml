
[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[plugins]]
  package = "@netlify/plugin-sitemap"

  [plugins.inputs]
  buildDir = "dist"
  exclude = [
    # Exclude pages you don't want in the sitemap
    '**/404/**',
    '**/admin/**',
    '**/search/**'
  ]
  changeFreq = "weekly"
  priority = 0.5

# Enable prerendering for social media crawlers
[[plugins]]
  package = "netlify-plugin-prerender-spa"

  [plugins.inputs]
    # Paths that should be prerendered
    paths = [
      "/",
      "/destinations/barcelona",
      "/destinations/new-york",
      "/destinations/paris",
      "/destinations/london",
      "/destinations/tokyo",
      "/destinations/crete",
      "/destinations/abu-dhabi",
      "/destinations/cyprus",
      "/destinations/thailand",
      "/destinations/ayia-napa",
      "/destinations/portugal",
      "/destinations/swiss-alps",
      "/destinations/turkey"
    ]
    # Detect bot user agents that should receive prerendered pages
    userAgents = [
      "googlebot",
      "bingbot",
      "yandex",
      "baiduspider",
      "facebookexternalhit",
      "twitterbot",
      "rogerbot",
      "linkedinbot",
      "embedly",
      "quora link preview",
      "showyoubot",
      "outbrain",
      "pinterest/0.",
      "developers.google.com/+/web/snippet",
      "slackbot",
      "vkShare",
      "W3C_Validator",
      "redditbot",
      "Applebot",
      "WhatsApp",
      "flipboard",
      "tumblr",
      "bitlybot",
      "SkypeUriPreview",
      "nuzzel",
      "Discordbot",
      "Google Page Speed",
      "Qwantify"
    ]

# Enable optimizations for better performance
[build.processing]
  skip_processing = false
[build.processing.css]
  bundle = true
  minify = true
[build.processing.js]
  bundle = true
  minify = true
[build.processing.html]
  pretty_urls = true
[build.processing.images]
  compress = true

# Add security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "upgrade-insecure-requests"
    # Enable HTTP/2 Server Push
    Link = "</src/index.css>; rel=preload; as=style, </src/main.tsx>; rel=preload; as=script"

# Add improved cache control for static assets (7+ days)
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Enable Brotli compression for better performance
[build.processing.brotli]
  enabled = true
  
# Additional optimizations via Edge Functions
[[edge_functions]]
  path = "/*"
  function = "optimize-static-assets"

