
[build]
  command = "npm run build"
  publish = "dist"

# CRITICAL: Handle crawlers/bots FIRST - This must come before any other redirects
[[redirects]]
  from = "/*"
  to = "https://service.prerender.io/https://www.allergy-free-travel.com/:splat"
  status = 200
  force = true
  conditions = { User-Agent = ["(?i)facebook", "(?i)facebookexternalhit", "(?i)whatsapp", "(?i)twitter", "(?i)linkedin", "(?i)pinterest", "(?i)slack", "(?i)telegram", "(?i)bot", "(?i)preview", "(?i)embedly", "(?i)quora"] }

# Handle 404 errors for regular users - This must come AFTER the bot redirects
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = { User-Agent = ["^((?!facebookexternalhit|whatsapp|twitterbot|linkedinbot|pinterest|slackbot|telegram|googlebot|bingbot|baiduspider|seznambot|bytespider|yandex|discord).)*$"] }

# Add security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "upgrade-insecure-requests"
    # Enable HTTP/2 Server Push
    Link = "</src/index.css>; rel=preload; as=style, </src/main.tsx>; rel=preload; as=script"
    # Important: Prerender token header for all requests
    X-Prerender-Token = "${PRERENDER_TOKEN}"

# Add improved cache control for static assets (7+ days)
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"
    Content-Type = "image/png"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Enable Brotli compression for better performance
[build.processing.brotli]
  enabled = true
  
# WhatsApp specific headers for all PNG images
[[headers]]
  for = "/*.png"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET"
    Access-Control-Allow-Headers = "*"
    Cache-Control = "public, max-age=604800"

# Specific header for the OG image to ensure proper content type
[[headers]]
  for = "/og-image-new.png"
  [headers.values]
    Content-Type = "image/png"
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/lovable-uploads/c0d4e111-501f-46b3-94ad-23c5b56f9736.png"
  [headers.values]
    Content-Type = "image/png"
    Cache-Control = "public, max-age=604800"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/lovable-uploads/e8b4dc3d-60a2-4fb7-bc33-77580f4d249c.png"
  [headers.values]
    Content-Type = "image/png"
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
    Access-Control-Allow-Origin = "*"
