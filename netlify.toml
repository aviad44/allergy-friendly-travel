
[build]
  command = "npm run build"
  publish = "dist"

# Edge functions with improved bot detection - this has highest priority
[[edge_functions]]
  path = "/*"
  function = "optimize-static-assets"

# Redirect code files and internal folders to 404
[[redirects]]
  from = "/src/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/node_modules/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/components/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/data/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/hooks/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/lib/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/types/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/utils/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/constants/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/integrations/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/supabase/*"
  to = "/404.html"
  status = 404
  force = true

# Block individual code files
[[redirects]]
  from = "/*.ts"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.tsx"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.js"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.jsx"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/package.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/package-lock.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/bun.lockb"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/tsconfig*.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.config.*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/components.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.gitignore"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/README.md"
  to = "/404.html"
  status = 404
  force = true

# URL normalization redirects
[[redirects]]
  from = "/destinations/abudhabi"
  to = "/destinations/abu-dhabi"
  status = 301

[[redirects]]
  from = "/destinations/newyork"
  to = "/destinations/new-york"
  status = 301

# Default handling for regular users - MUST come after all specific redirects
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Add security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "upgrade-insecure-requests"
    X-Prerender-Token = "${PRERENDER_TOKEN}"
    Access-Control-Allow-Origin = "*"

# Cache control for static assets
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"
    Content-Type = "image/png"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET"
    Access-Control-Allow-Headers = "Origin, X-Requested-With, Content-Type, Accept"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET"
    Access-Control-Allow-Headers = "Origin, X-Requested-With, Content-Type, Accept"

# Special handling for social media crawlers
[[headers]]
  for = "/"
  [headers.values]
    X-Social-Media-Ready = "true"
    Access-Control-Allow-Origin = "*"
