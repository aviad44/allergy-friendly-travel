
[build]
  command = "npm run build"
  publish = "dist"

# Edge functions with improved bot detection
[[edge_functions]]
  path = "/*"
  function = "optimize-static-assets"

# Handle 404 errors for regular users
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  [redirects.conditions]
    User-Agent = ["!facebookexternalhit", "!Facebookexternalhit", "!FacebookBot", "!Facebook", "!facebook", "!Whatsapp", "!WhatsApp", "!twitter", "!Twitter", "!Twitterbot", "!linkedinbot", "!LinkedInBot", "!pinterest", "!Pinterest"]

# Add security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "upgrade-insecure-requests"
    # CRITICAL: Prerender token header for all requests
    X-Prerender-Token = "${PRERENDER_TOKEN}"

# Add improved cache control for static assets (7+ days)
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"
    Content-Type = "image/png"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

# Special headers for the homepage OG image
[[headers]]
  for = "/lovable-uploads/toronto-skyline.png"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET"
    Cache-Control = "public, max-age=604800"
    Content-Type = "image/png"

# WhatsApp specific headers for all PNG images
[[headers]]
  for = "/*.png"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET"
    Cache-Control = "public, max-age=604800"
