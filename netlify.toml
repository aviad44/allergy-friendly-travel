
[build]
  command = "npm run build"
  publish = "dist"

# Edge functions with improved bot detection - this has highest priority
[[edge_functions]]
  path = "/*"
  function = "optimize-static-assets"

# Default handling for regular users
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Block access to development directories
[[redirects]]
  from = "/src/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/node_modules/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/components/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/data/*"
  to = "/404.html"
  status = 404
  force = true

# Add security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "upgrade-insecure-requests"
    # CRITICAL: Prerender token header for all requests
    X-Prerender-Token = "${PRERENDER_TOKEN}"
    # Critical for Facebook crawlers
    Access-Control-Allow-Origin = "*"

# Add improved cache control for static assets
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"
    Content-Type = "image/png"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET"

# Special handling for social media crawlers
[[headers]]
  for = "/"
  [headers.values]
    X-Social-Media-Ready = "true"
    Access-Control-Allow-Origin = "*"
